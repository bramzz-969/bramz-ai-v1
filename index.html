<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bramz AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0d0d0d;
            --bg-sidebar: #121212;
            --bg-user: #007bff;
            --bg-ai: #242424;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        #sidebar {
            width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border);
            height: 100%; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0; z-index: 1000;
        }
        #sidebar.collapsed { margin-left: -280px; }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .btn-new {
            width: 100%; padding: 12px; border-radius: 12px; background: white; color: black;
            border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .chat-history { flex: 1; overflow-y: auto; padding: 10px; }
        .history-card {
            padding: 12px; border-radius: 10px; color: var(--text-muted); cursor: pointer;
            font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-card:hover, .history-card.active { background: #1a1a1a; color: white; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        
        header {
            padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; background: var(--bg-body);
        }

        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .welcome { margin: auto; text-align: center; max-width: 450px; padding: 40px 20px; }
        .welcome h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; background: linear-gradient(45deg, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome p { color: var(--text-muted); line-height: 1.6; }

        /* BUBBLES */
        .msg-wrapper { display: flex; width: 100%; flex-direction: column; }
        .msg-wrapper.user { align-items: flex-end; }
        .msg-wrapper.ai { align-items: flex-start; }

        .bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6;
            position: relative; word-wrap: break-word;
        }
        .user .bubble { background: var(--bg-user); color: white; border-bottom-right-radius: 4px; }
        .ai .bubble { background: var(--bg-ai); color: #e4e4e7; border-bottom-left-radius: 4px; }

        .msg-info { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; margin-left: 12px; margin-right: 12px; }

        /* INPUT AREA */
        .input-box-container {
            padding: 20px; background: linear-gradient(transparent, var(--bg-body) 40%);
        }
        .input-inner {
            max-width: 800px; margin: 0 auto; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 24px; padding: 8px 16px; display: flex; align-items: flex-end; gap: 10px;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px 0;
            font-size: 15px; resize: none; max-height: 200px; min-height: 40px; line-height: 1.4;
        }

        .send-btn {
            background: white; color: black; border: none; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
        }
        .send-btn:disabled { opacity: 0.2; cursor: default; }

        /* LOADER */
        .typing { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: blink 1.2s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        @media (max-width: 768px) {
            #sidebar { position: fixed; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            .bubble { max-width: 85%; }
            #overlay.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }
        }
        #overlay { display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <button class="btn-new" onclick="newChat()">
                <span>+</span> Chat Baru
            </button>
        </div>
        <div class="chat-history" id="historyList"></div>
    </aside>

    <div class="main">
        <header>
            <button class="send-btn" style="background:transparent; color:white; width:auto; border-radius:8px; padding:0 8px;" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div style="font-weight: 700; font-size: 16px;">BRAMZ AI</div>
            <div style="width: 44px;"></div>
        </header>

        <div id="chat-area">
            <div class="welcome" id="welcomeBox">
                <h1>Bramz AI</h1>
                <p>Butuh jawaban?, pake Bramz Ai aja. Gw bakal bantu walau loading lama</p>
            </div>
        </div>

        <div class="input-box-container">
            <div class="input-inner">
                <textarea id="userInput" placeholder="Tanya bramz disini..." rows="1" oninput="resizeBox(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE = 'bramz_sxtream_query_db';
        let chats = JSON.parse(localStorage.getItem(STORAGE)) || [];
        let currentChatId = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('overlay').classList.toggle('show');
        }

        function resizeBox(el) {
            el.style.height = '40px';
            el.style.height = el.scrollHeight + 'px';
            document.getElementById('sendBtn').disabled = !el.value.trim();
        }

        function addMessageUI(role, text) {
            const welcome = document.getElementById('welcomeBox');
            if (welcome) welcome.style.display = 'none';

            const area = document.getElementById('chat-area');
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${role}`;
            
            wrap.innerHTML = `
                <div class="msg-info">${role === 'user' ? 'User' : 'Bramz'}</div>
                <div class="bubble">${text}</div>
            `;
            area.appendChild(wrap);
            area.scrollTop = area.scrollHeight;
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            input.value = '';
            input.style.height = '40px';

            if (!currentChatId) {
                currentChatId = Date.now().toString();
                chats.unshift({ id: currentChatId, title: val.slice(0, 30), msgs: [] });
            }

            const activeChat = chats.find(c => c.id === currentChatId);
            activeChat.msgs.push({ role: 'user', content: val });
            addMessageUI('user', val);

            const loader = document.createElement('div');
            loader.className = 'msg-wrapper ai';
            loader.innerHTML = `<div class="msg-info">Bramz</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            document.getElementById('chat-area').appendChild(loader);

            try {
                // Menggunakan API Sxtream dengan parameter ?query=
                const response = await fetch(`https://api.sxtream.my.id/ai/ai-gpt4?query=${encodeURIComponent(val)}`);
                const data = await response.json();

                if (data.status && data.result) {
                    const reply = data.result;
                    loader.remove();
                    activeChat.msgs.push({ role: 'ai', content: reply });
                    addMessageUI('ai', reply);
                    save();
                } else {
                    throw new Error("Ai error, bilang ke ibra butuh perbaikan.");
                }
            } catch (e) {
                loader.querySelector('.bubble').innerText = "Waduh error ngab: " + e.message;
            }
        }

        function save() {
            localStorage.setItem(STORAGE, JSON.stringify(chats));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = chats.map(c => `
                <div class="history-card ${c.id === currentChatId ? 'active' : ''}" onclick="loadChat('${c.id}')">
                    ${c.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            const area = document.getElementById('chat-area');
            area.innerHTML = '';
            chat.msgs.forEach(m => addMessageUI(m.role === 'user' ? 'user' : 'ai', m.content));
            renderHistory();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function newChat() {
            currentChatId = null;
            document.getElementById('chat-area').innerHTML = `
                <div class="welcome" id="welcomeBox">
                    <h1>Bramz AI</h1>
                    <p>Butuh jawabab?, tulis aja gw siap ngebantu walau loading lama</p>
                </div>
            `;
            if (window.innerWidth <= 768) toggleSidebar();
            renderHistory();
        }

        if (window.innerWidth > 1024) document.getElementById('sidebar').classList.remove('collapsed');
        renderHistory();
    </script>
</body>
</html>
